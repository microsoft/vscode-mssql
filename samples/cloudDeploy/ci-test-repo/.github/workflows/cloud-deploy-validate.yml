# Cloud Deploy — Validate schema on pull requests.
#
# Runs the SAME headless validation engine used locally in VS Code, but here on
# a GitHub-hosted runner. On every pull request it:
#   1. checks out the merge candidate (the PR as it would land on the base),
#   2. validates it with the bundled CLI,
#   3. diffs it against the base branch (when a base run is available),
#   4. uploads the run artifacts, and
#   5. posts a sticky summary comment on the pull request.
#
# Packaging: the CLI ships as one self-contained file at tools/mssql-validate.cjs
# (bundled with esbuild). Refresh it with `npm run build:cloud-deploy-cli` in the
# vscode-mssql repo and copy dist/cloud-deploy-cli/mssql-validate.cjs here.
#
# SQL host: when an environment enables the database-backed validators, the
# engine starts its own throwaway SQL Server with `docker run` on the runner —
# GitHub-hosted runners ship Docker — so the local and CI code paths stay
# identical. The sample "ci" environment below is static-analysis-only, so it
# needs no database.

name: Cloud Deploy - Validate schema

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the merge candidate
        uses: actions/checkout@v4

      - name: Check out the base branch (diff baseline)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Set up .NET (SQL project build)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Workload-simulation gate (optional, advisory). sqlpysim is Bob Ward's
      # MIT-licensed workload replay script; it drives the configured workload
      # against the throwaway validation database to measure throughput and
      # latency, then reports the before/after delta on the pull request. The gate
      # never fails a run (Warning at most) and skips entirely unless
      # MSSQL_CD_SQLPYSIM points at the script. To enable it, set the SQLPYSIM_URL
      # repository variable (Settings > Secrets and variables > Actions >
      # Variables) to a raw URL for a pinned sqlpysim release, and give the "ci"
      # environment a database-backed runtime host plus a "workload-simulation"
      # validation entry pointing at a workload file.
      - name: Set up Python (workload simulation)
        if: ${{ vars.SQLPYSIM_URL != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the workload-simulation driver
        if: ${{ vars.SQLPYSIM_URL != '' }}
        run: pip install mssql-python

      - name: Fetch the pinned sqlpysim workload driver
        if: ${{ vars.SQLPYSIM_URL != '' }}
        run: curl -fsSL "${{ vars.SQLPYSIM_URL }}" -o tools/sqlpysim.py

      # Best-effort baseline: if the base branch fails to validate, we still
      # validate the candidate — the diff is simply skipped.
      - name: Validate the base branch (baseline run)
        continue-on-error: true
        env:
          MSSQL_CD_PYTHON: python
          MSSQL_CD_SQLPYSIM: ${{ vars.SQLPYSIM_URL != '' && 'tools/sqlpysim.py' || '' }}
        run: >
          node tools/mssql-validate.cjs run-gates
          --env ci
          --config base/.mssql/environments.json
          --workspace base
          --out main.cdrun.zip

      - name: Validate the merge candidate
        env:
          MSSQL_CD_PYTHON: python
          MSSQL_CD_SQLPYSIM: ${{ vars.SQLPYSIM_URL != '' && 'tools/sqlpysim.py' || '' }}
        run: |
          BASELINE=()
          if [ -f main.cdrun.zip ]; then BASELINE=(--baseline main.cdrun.zip); fi
          node tools/mssql-validate.cjs run-gates \
            --env ci \
            --config .mssql/environments.json \
            --out candidate.cdrun.zip \
            "${BASELINE[@]}" \
            --report-out pr-comment.md \
            --source-commit ${{ github.event.pull_request.head.sha }} \
            --source-ref ${{ github.event.pull_request.number }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-deploy-runs
          path: "*.cdrun.zip"

      - name: Post the result comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- cloud-deploy-validate -->";
            let body;
            try {
              body = fs.readFileSync("pr-comment.md", "utf8");
            } catch {
              return; // No report was produced (the candidate run crashed before writing it).
            }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
