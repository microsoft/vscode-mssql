parameters:
  - name: packageOffline
    type: boolean
    default: true

steps:
  - task: UseNode@1
    displayName: "Use Node 24.x"
    inputs:
      version: 24.x

  - pwsh: |
      npm run build -- --target mssql --prod
    displayName: MSSQL - Build extension
    workingDirectory: "$(Build.SourcesDirectory)"

  - pwsh: |
      npm run lint -- --target mssql
    displayName: MSSQL - Lint code
    workingDirectory: "$(Build.SourcesDirectory)"

  - pwsh: |
      npm run package -- --target mssql --online
    displayName: MSSQL - Package extension (online)
    workingDirectory: "$(Build.SourcesDirectory)"

  - pwsh: |
      npm run package -- --target mssql --offline
    displayName: MSSQL - Package extension (offline)
    workingDirectory: "$(Build.SourcesDirectory)"
    condition: eq( ${{ parameters.packageOffline }}, 'true')

  # using CopyFiles to isolate all .vsix packages because PublishPipelineArtifact can't use wildcards
  - task: CopyFiles@2
    displayName: MSSQL - Copy VSIXs to clean folder
    inputs:
      SourceFolder: "$(Build.SourcesDirectory)/extensions/mssql"
      Contents: "*.vsix"
      TargetFolder: "$(Build.ArtifactStagingDirectory)/vsix"
