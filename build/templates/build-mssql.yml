parameters:
  - name: packageOffline
    type: boolean
    default: true

steps:
  - task: UseNode@1
    displayName: "Use Node 22.x"
    inputs:
      version: 22.x

  - pwsh: |
      npm run build -- --target mssql --prod
    displayName: MSSQL - Build extension
    workingDirectory: "$(Build.SourcesDirectory)"

  - pwsh: |
      npm run lint -- --target mssql
    displayName: MSSQL - Lint code
    workingDirectory: "$(Build.SourcesDirectory)"

  - pwsh: |
      npm run test -- --target mssql
    displayName: MSSQL - Run tests
    workingDirectory: "$(Build.SourcesDirectory)"

  - task: PublishTestResults@2
    displayName: MSSQL - Publish test results
    inputs:
      testResultsFormat: "JUnit"
      testResultsFiles: "$(Build.SourcesDirectory)/extensions/mssql/test-reports/test-results-ext.xml"
    condition: succeededOrFailed()

  - task: PublishCodeCoverageResults@2
    displayName: MSSQL - Publish code coverage
    inputs:
      summaryFileLocation: "$(Build.SourcesDirectory)/extensions/mssql/coverage/cobertura-coverage.xml"
    condition: succeededOrFailed()

  - pwsh: |
      npm run package -- --target mssql --online
    displayName: MSSQL - Package extension (online)
    workingDirectory: "$(Build.SourcesDirectory)"

  - pwsh: |
      npm run package -- --target mssql --offline
    displayName: MSSQL - Package extension (offline)
    workingDirectory: "$(Build.SourcesDirectory)"
    condition: eq( ${{ parameters.packageOffline }}, 'true')

  # using CopyFiles to isolate all .vsix packages because PublishPipelineArtifact can't use wildcards
  - task: CopyFiles@2
    displayName: MSSQL - Copy VSIXs to clean folder
    inputs:
      SourceFolder: "$(Build.SourcesDirectory)/extensions/mssql"
      Contents: "*.vsix"
      TargetFolder: "$(Build.ArtifactStagingDirectory)/vsix"
